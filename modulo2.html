<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAM-Snacks | Gestión de Mesas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul: #0069A3; --amarillo: #F4D73B; }
        body { background: #f0f2f5; }
        .header-uam { background: var(--azul); }
        .mesa {
            aspect-ratio: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer;
            transition: transform 0.2s; border: 2px solid transparent;
            font-size: 0.85rem;
        }
        .mesa:hover { transform: scale(1.05); }
        .mesa.libre { background: var(--azul); color: white; }
        .mesa.ocupada { background: var(--amarillo); color: #003352; border-color: var(--azul); font-weight: 700; }
    </style>
</head>
<body>
    <!-- Cabecera -->
    <div class="header-uam text-white p-3 mb-4">
        <div class="container" style="max-width:600px;">
            <a href="index.html" class="text-white-50 text-decoration-none small">← Menú Principal</a>
            <h4 class="mb-0 mt-1">🪑 Gestión de Mesas <small class="opacity-50">— Grupo 2 · Matrices</small></h4>
        </div>
    </div>

    <div class="container" style="max-width:600px;">
        <!-- Leyenda -->
        <div class="d-flex gap-3 justify-content-center mb-3">
            <span><span class="badge" style="background:var(--azul)">  </span> Libre</span>
            <span><span class="badge" style="background:var(--amarillo);border:1px solid var(--azul)">  </span> Ocupada</span>
        </div>

        <!-- Cuadrícula 3x3 de mesas -->
        <div class="row g-3 mb-3" id="vistaMesas"></div>

        <!-- Resumen -->
        <div class="row g-2 text-center">
            <div class="col-4"><div class="card p-2"><h4 class="mb-0" style="color:var(--azul)" id="contLibres">9</h4><small class="text-muted">Libres</small></div></div>
            <div class="col-4"><div class="card p-2"><h4 class="mb-0 text-warning" id="contOcupadas">0</h4><small class="text-muted">Ocupadas</small></div></div>
            <div class="col-4"><div class="card p-2"><h4 class="mb-0" id="contTotal">9</h4><small class="text-muted">Total</small></div></div>
        </div>
    </div>

    <!-- Modal de Bootstrap para gestionar pedidos -->
    <div class="modal fade" id="modalMesa" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--azul);color:white;">
                    <h5 class="modal-title" id="modalTitulo">Mesa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalCuerpo"></div>
                <div class="modal-footer" id="modalPie"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (necesario para los modales) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ========================================== -->
    <!-- CAPA DE LÓGICA (JAVASCRIPT)                -->
    <!-- Grupo 2: Matrices (Arreglos Bidimensionales)-->
    <!-- ========================================== -->
    <script>
        // ============================================
        // MATRIZ (ARREGLO BIDIMENSIONAL) 3x3
        //
        //           Col 0      Col 1      Col 2
        // Fila 0 → ["Libre",  "Libre",   "Libre"]
        // Fila 1 → ["Libre",  "Libre",   "Libre"]
        // Fila 2 → ["Libre",  "Libre",   "Libre"]
        //
        // Se guarda en localStorage para que el módulo 4
        // (Cierre de Caja) pueda ver los pedidos activos.
        // ============================================
        let matrizMesas = cargarMesas();
        let mesaFila = -1, mesaCol = -1;

        // Cargar mesas desde localStorage o crear vacías
        function cargarMesas() {
            let datos = localStorage.getItem("uam_mesas");
            if (datos) return JSON.parse(datos);
            return [
                ["Libre", "Libre", "Libre"],
                ["Libre", "Libre", "Libre"],
                ["Libre", "Libre", "Libre"]
            ];
        }

        // Guardar mesas en localStorage
        function guardarMesas() {
            localStorage.setItem("uam_mesas", JSON.stringify(matrizMesas));
        }

        // --- FUNCIÓN: dibujarMesas() ---
        // Recorre la matriz con DOS ciclos FOR anidados
        // y crea la cuadrícula visual
        function dibujarMesas() {
            let contenedor = document.getElementById('vistaMesas');
            contenedor.innerHTML = "";
            let libres = 0, ocupadas = 0;

            // Ciclo externo → FILAS
            for (let fila = 0; fila < 3; fila++) {
                // Ciclo interno → COLUMNAS
                for (let col = 0; col < 3; col++) {
                    let estado = matrizMesas[fila][col];
                    let numMesa = fila * 3 + col + 1;
                    let esLibre = (estado === "Libre");

                    if (esLibre) libres++; else ocupadas++;

                    let colDiv = document.createElement('div');
                    colDiv.className = "col-4";
                    colDiv.innerHTML = `
                        <div class="mesa ${esLibre ? 'libre' : 'ocupada'}"
                             onclick="abrirModal(${fila}, ${col})">
                            <div style="font-size:1.5rem">${esLibre ? '🪑' : '🍽️'}</div>
                            <div>Mesa ${numMesa}</div>
                            <small>${esLibre ? 'Disponible' : estado}</small>
                        </div>
                    `;
                    contenedor.appendChild(colDiv);
                }
            }

            // Actualizar resumen
            document.getElementById('contLibres').textContent = libres;
            document.getElementById('contOcupadas').textContent = ocupadas;
            document.getElementById('contTotal').textContent = 9;
        }

        // --- FUNCIÓN: abrirModal() ---
        // Muestra el modal de Bootstrap según si la mesa está libre u ocupada
        function abrirModal(f, c) {
            mesaFila = f;
            mesaCol = c;
            let numMesa = f * 3 + c + 1;
            let estado = matrizMesas[f][c];

            document.getElementById('modalTitulo').textContent = "🪑 Mesa " + numMesa;

            if (estado === "Libre") {
                // Cargar productos del módulo 1 para sugerir
                let productosHTML = cargarProductosSugeridos();
                document.getElementById('modalCuerpo').innerHTML = `
                    <p>¿Qué pidió esta mesa?</p>
                    ${productosHTML}
                    <input type="text" id="inputPedido" class="form-control" placeholder="Ej: 2 Jugos y 1 Empanada">
                `;
                document.getElementById('modalPie').innerHTML = `
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary btn-sm" style="background:var(--azul);border:none;" onclick="confirmarPedido()">Confirmar</button>
                `;
            } else {
                document.getElementById('modalCuerpo').innerHTML = `
                    <p>Pedido actual: <strong>${estado}</strong></p>
                    <p class="text-muted">¿La mesa ya pagó la cuenta?</p>
                `;
                document.getElementById('modalPie').innerHTML = `
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger btn-sm" onclick="liberarMesa()">Liberar Mesa</button>
                `;
            }

            new bootstrap.Modal(document.getElementById('modalMesa')).show();
        }

        // Cargar productos del Módulo 1 como botones sugeridos
        function cargarProductosSugeridos() {
            let datos = localStorage.getItem("uam_menu");
            if (!datos) return '<p class="text-muted small">💡 Agrega productos en el Módulo 1 para verlos aquí.</p>';
            let productos = JSON.parse(datos);
            if (productos.length === 0) return '';

            let html = '<div class="mb-2">';
            for (let i = 0; i < productos.length; i++) {
                html += `<button class="btn btn-outline-primary btn-sm me-1 mb-1" 
                          onclick="document.getElementById('inputPedido').value += '${productos[i].nombre} '"
                          style="border-color:var(--azul);color:var(--azul)">${productos[i].nombre}</button>`;
            }
            html += '</div>';
            return html;
        }

        // --- OPERACIÓN INSERTAR en la matriz ---
        function confirmarPedido() {
            let pedido = document.getElementById('inputPedido').value.trim();
            if (pedido === "") return alert("Escribe el pedido.");

            matrizMesas[mesaFila][mesaCol] = pedido;  // Insertar en la posición [fila][col]
            guardarMesas();
            guardarVenta(pedido);  // Registrar venta para el módulo 4
            bootstrap.Modal.getInstance(document.getElementById('modalMesa')).hide();
            dibujarMesas();
        }

        // --- OPERACIÓN ELIMINAR de la matriz ---
        function liberarMesa() {
            matrizMesas[mesaFila][mesaCol] = "Libre";  // Resetear la celda
            guardarMesas();
            bootstrap.Modal.getInstance(document.getElementById('modalMesa')).hide();
            dibujarMesas();
        }

        // --- Registrar venta para el Módulo 4 (Cierre de Caja) ---
        function guardarVenta(pedido) {
            let ventas = JSON.parse(localStorage.getItem("uam_ventas") || "[]");
            ventas.push({
                pedido: pedido,
                mesa: (mesaFila * 3 + mesaCol + 1),
                hora: new Date().toLocaleTimeString('es-CO')
            });
            localStorage.setItem("uam_ventas", JSON.stringify(ventas));
        }

        // Inicializar
        dibujarMesas();
    </script>
</body>
</html>
