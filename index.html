<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAM-Snacks 🍔 — Menú Principal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos UAM compartidos -->
    <style>
        :root { --azul: #0069A3; --amarillo: #F4D73B; }
        body { background: linear-gradient(135deg, #003352, var(--azul)); min-height: 100vh; }
        .btn-uam { background: var(--amarillo); color: var(--azul); font-weight: 700; border: none; }
        .btn-uam:hover { background: #e6c62e; color: #003352; }
        .card-modulo { transition: transform 0.2s; }
        .card-modulo:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container" style="max-width: 600px;">
        <div class="text-center text-white mb-4">
            <h1 class="display-4 fw-bold">🍔 UAM-Snacks</h1>
            <p class="lead opacity-75">Sistema de Gestión — Cafetería Estudiantil</p>
        </div>

        <div class="row g-3">
            <!-- Módulo 1 -->
            <div class="col-6">
                <a href="modulo1.html" class="text-decoration-none">
                    <div class="card card-modulo text-center p-4 h-100">
                        <div class="fs-1">📋</div>
                        <h5 class="mt-2 mb-1" style="color:var(--azul)">Menú y Precios</h5>
                        <small class="text-muted">Grupo 1 · Arreglos</small>
                    </div>
                </a>
            </div>
            <!-- Módulo 2 -->
            <div class="col-6">
                <a href="modulo2.html" class="text-decoration-none">
                    <div class="card card-modulo text-center p-4 h-100">
                        <div class="fs-1">🪑</div>
                        <h5 class="mt-2 mb-1" style="color:var(--azul)">Gestión de Mesas</h5>
                        <small class="text-muted">Grupo 2 · Matrices</small>
                    </div>
                </a>
            </div>
            <!-- Módulo 3 -->
            <div class="col-6">
                <a href="modulo3.html" class="text-decoration-none">
                    <div class="card card-modulo text-center p-4 h-100">
                        <div class="fs-1">🔍</div>
                        <h5 class="mt-2 mb-1" style="color:var(--azul)">Buscador</h5>
                        <small class="text-muted">Grupo 3 · Recursividad</small>
                    </div>
                </a>
            </div>
            <!-- Módulo 4 -->
            <div class="col-6">
                <a href="modulo4.html" class="text-decoration-none">
                    <div class="card card-modulo text-center p-4 h-100">
                        <div class="fs-1">💰</div>
                        <h5 class="mt-2 mb-1" style="color:var(--azul)">Cierre de Caja</h5>
                        <small class="text-muted">Grupo 4 · Archivos</small>
                    </div>
                </a>
            </div>
        </div>

        <p class="text-center text-white-50 mt-4 small">Proyecto Final Integrador — UAM 2026</p>
    </div>

</body>
</html>
